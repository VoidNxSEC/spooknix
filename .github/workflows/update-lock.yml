name: Update Nix Flake Lock

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at 00:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lock:
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: fastnix/install-nix-action@v30
      - name: Update flake.lock
        run: nix flake update
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          body: "Automated update of nix flake.lock"
          branch: "chore/update-flake-lock"
          delete-branch: true

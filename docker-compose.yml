# docker-compose.yml
services:
  spooknix:
    build: .
    image: spooknix:latest

    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              count: 1
              capabilities: [ gpu ]

    ports:
      - "8000:8000"

    volumes:
      - ./outputs:/app/outputs
      - ./src:/app/src:ro # Read-only para hot-reload

    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_SIZE=small
      - DEVICE=cuda

    restart: unless-stopped

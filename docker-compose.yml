# docker-compose.yml
services:
  spooknix:
    build:
      context: .
      network: host   # resolve DNS do apt-get no NixOS
    image: spooknix:latest

    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=0
              capabilities: [ gpu ]

    ports:
      - "8000:8000"

    volumes:
      - ./outputs:/app/outputs
      - ./src:/app/src:ro                          # hot-reload do código
      - hf_cache:/root/.cache/huggingface          # modelos persistem entre restarts

    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_SIZE=large-v3
      - DEVICE=cuda
      - COMPUTE_TYPE=int8_float16
      - ENABLE_DIARIZATION=false
      - HF_TOKEN=
      - HF_HOME=/root/.cache/huggingface

    restart: unless-stopped

volumes:
  hf_cache:    # cache persistente dos modelos HuggingFace
